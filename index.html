<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DigiTech | Modern Electronics Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->

    <header class="header">
      <div class="logo">Digitech</div>

      <div class="search-box">
        <input type="text" id="search" placeholder="Search products..." />
      </div>

      <button class="theme-btn">🌙</button>
      <span class="user-info"></span>
      <button class="logout-btn">Logout</button>
      <a href="cart.html" class="cart-btn">
        🛒 Cart
        <span class="cart-count">0</span>
      </a>
    </header>

    <!-- HERO -->

    <section class="hero">
      <h1>Discover the Future of Technology</h1>

      <p>Premium electronics with modern design and unbeatable performance.</p>
    </section>

    <!-- PRODUCTS -->

    <main>
      <section class="products">
        <!-- JavaScript buraya ürünleri oluşturacak -->
      </section>
    </main>

    <!-- FOOTER -->

    <footer>
      <p>© 2026 DigiTech. All rights reserved.</p>
    </footer>

    <div class="modal">
      <div class="modal-content">
        <button class="close-modal">&times;</button>

        <img class="modal-image" src="" alt="" />

        <h2 class="modal-title"></h2>

        <p class="modal-rating"></p>

        <p class="modal-price"></p>

        <p class="modal-description">
          Premium product with excellent performance and modern design.
        </p>

        <button class="modal-buy">Add To Cart</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
